<html>
    <head>
        <title>Positioning</title>
        <style>
            div.r{
                position: relative;
                left: 30px;
                border: 3px solid green;
            }
            div.f{
                position: fixed;
                left: 30px;
                border: 3px solid red;
            }
            div.a{
                position: absolute;
                left: 70px;
                border: 3px solid blue;
            }
            div.s{
                position: static;
                left: 30px;
                border: 3px solid yellow;
            }
        </style>
    </head>
    <body>
        <div class="r">relative</div>
        <div class="f">fixed</div>
        <div class="a">absolute</div><br>
        <div class="s">static</div>
    </body>
</html>
